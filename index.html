<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NASRDA Ops Hub</title>
  
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0e27">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0a0e27;
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }
    .logo {
      width: 120px;
      height: auto;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 1.9rem;
      margin-bottom: 12px;
      font-weight: 700;
    }
    p {
      opacity: 0.8;
      margin-bottom: 32px;
      font-size: 1rem;
    }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 600;
      font-size: 1rem;
      transition: opacity 0.2s;
    }
    .btn:active {
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <img src="/National_Space_Research_and_Development_Agency_logo.png" alt="NASRDA Logo" class="logo">
  <h1>NASRDA Operations Hub</h1>
  <p>Select a mode to continue</p>
  <a href="/guest/" class="btn">Enter Guest Mode</a>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
